# CAPE Rightsizing — sql-claims-always-on-primary
# Generated by CAPE AI Agent · Wave 1
# Projected saving: ~$4,350/mo · HIPAA/SOX validated

- name: Rightsize SQL Server Claims Always-On Primary
  hosts: sql-claims-always-on-primary
  gather_facts: false
  tasks:
    - name: Set max server memory 32768 → 16384 MB
      community.general.mssql_script:
        login_host: "{{ ansible_host }}"
        login_user: sa
        login_password: "{{ vault_sa_password }}"
        script: |
          EXEC sp_configure 'show advanced options', 1;
          RECONFIGURE;
          EXEC sp_configure 'max server memory', 16384;  -- was: 32768
          EXEC sp_configure 'max degree of parallelism', 4;  -- was: 8
          RECONFIGURE WITH OVERRIDE;
      tags: [cape-resized, wave-1-rightsizing]
